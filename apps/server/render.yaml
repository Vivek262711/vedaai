services:
  - type: web
    name: vedaai-server
    runtime: node
    plan: starter
    buildCommand: cd apps/server && pnpm install && pnpm build
    startCommand: cd apps/server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGO_URI
        fromDatabase:
          name: vedaai-mongo
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vedaai-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: AI_MODEL
        value: gpt-4o
      - key: AI_PROVIDER
        value: openai

databases:
  - name: vedaai-mongo
    plan: starter

  - name: vedaai-redis
    plan: starter
