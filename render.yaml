services:
  - type: web
    name: vedaai-server
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm --filter @vedaai/server build
    startCommand: cd apps/server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: AI_MODEL
        value: gemini-2.5-flash
      - key: QUEUE_CONCURRENCY
        value: 2
      - key: JOB_TIMEOUT
        value: 120000
      - key: JOB_MAX_RETRIES
        value: 3
      - key: PDF_STORAGE_PATH
        value: /tmp/pdfs
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
