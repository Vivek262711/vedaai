services:
  - type: web
    name: vedaai-server
    runtime: docker
    dockerfilePath: apps/server/Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.10.0"
      - key: PNPM_VERSION
        value: "9.15.0"
      - key: PORT
        value: "4000"
      - key: CORS_ORIGIN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: AI_MODEL
        value: gemini-2.5-flash
      - key: QUEUE_CONCURRENCY
        value: "2"
      - key: JOB_TIMEOUT
        value: "120000"
      - key: JOB_MAX_RETRIES
        value: "3"
      - key: PDF_STORAGE_PATH
        value: /tmp/pdfs
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium-browser
